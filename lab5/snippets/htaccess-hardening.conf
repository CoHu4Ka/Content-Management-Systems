# ============================================================
#  .htaccess — Security Hardening
#  Лабораторная работа №5 · Безопасность WordPress
#
#  ИНСТРУКЦИЯ: Добавить блоки в файл .htaccess в корне сайта
#  ПОСЛЕ стандартных правил WordPress (BEGIN WordPress ... END)
# ============================================================


# ── 1. Защита wp-config.php ─────────────────────────────────
<files wp-config.php>
    order allow,deny
    deny from all
</files>


# ── 2. Защита .htaccess (самозащита) ────────────────────────
<files .htaccess>
    order allow,deny
    deny from all
</files>


# ── 3. Блокировка прямого доступа к debug.log ───────────────
<files debug.log>
    order allow,deny
    deny from all
</files>


# ── 4. Отключить отображение содержимого директорий ─────────
Options -Indexes


# ── 5. Блокировка XML-RPC (если не используется Jetpack/REST)
<files xmlrpc.php>
    order deny,allow
    deny from all
</files>


# ── 6. Запрет доступа к файлам с чувствительными расширениями
<FilesMatch "\.(log|sql|bak|swp|orig|tmp)$">
    order allow,deny
    deny from all
</FilesMatch>


# ── 7. Защита wp-includes (прямой доступ к PHP-файлам) ──────
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /
    RewriteRule ^wp-admin/includes/ - [F,L]
    RewriteRule !^wp-includes/ - [S=3]
    RewriteRule ^wp-includes/[^/]+\.php$ - [F,L]
    RewriteRule ^wp-includes/js/tinymce/langs/.+\.php - [F,L]
    RewriteRule ^wp-includes/theme-compat/ - [F,L]
</IfModule>


# ── 8. Базовые HTTP Security Headers ────────────────────────
<IfModule mod_headers.c>
    # Запрет встраивания в iframe (clickjacking)
    Header always set X-Frame-Options "SAMEORIGIN"

    # Запрет MIME-type sniffing
    Header always set X-Content-Type-Options "nosniff"

    # Базовая XSS-защита для старых браузеров
    Header always set X-XSS-Protection "1; mode=block"

    # Referrer policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Скрыть версию сервера
    Header unset Server
    Header unset X-Powered-By
</IfModule>


# ── 9. Ограничение методов HTTP ─────────────────────────────
<LimitExcept GET POST HEAD>
    deny from all
</LimitExcept>


# ── 10. Блокировка подозрительных User-Agent ────────────────
<IfModule mod_rewrite.c>
    RewriteCond %{HTTP_USER_AGENT} (havij|nikto|sqlmap|nmap|nessus|w3af) [NC]
    RewriteRule .* - [F,L]
</IfModule>


# ── 11. Автоматические обновления (пример для Apache cron) ──
# Для автообновления тем/плагинов добавьте в wp-config.php:
# add_filter( 'auto_update_plugin', '__return_true' );
# add_filter( 'auto_update_theme',  '__return_true' );
